name: CI Pipeline

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ "main" ]

jobs:
  clang-format:
    name: Run Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add LLVM APT repository
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21


      - name: Install clang-format-21
        run: sudo apt-get install -y clang-format-21

      - name: Run clang-format check
        run: |
          TARGET_DIRS=""
          for dir in Core Platforms Subsystems EngineApplication Engine Main Test; do
            if [ -d "$dir" ]; then
              TARGET_DIRS="$TARGET_DIRS $dir"
            fi
          done

          if [ -n "$TARGET_DIRS" ]; then
            echo "Checking format for: $TARGET_DIRS"
            find $TARGET_DIRS -type f \( -name "*.h" -o -name "*.cc" \) | xargs -r clang-format-21 -i

            if [ -n "$(git status --porcelain -uno)" ]; then
              echo "--------------------------------------------------"
              echo " !! FORMAT MISMATCH DETECTED !! "
              echo "--------------------------------------------------"
              git diff --color
              exit 1
            else
              echo "All files in ($TARGET_DIRS) are properly formatted!"
            fi
          fi

  clang-tidy:
    name: Run Static Analysis
    needs: clang-format
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_tool: Ninja
            build_type: Debug
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-latest
            build_tool: Ninja
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure cmake for clang-tidy
        shell: bash
        run: |
          cmake -S "${{ github.workspace }}" \
          -B "${{ github.workspace }}/build" \
          -G "${{ matrix.build_tool }}" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
          -DENABLE_TEST=OFF

      - name: Run clang-tidy
        shell: bash
        run: |
          TARGET_DIRS="Core Platforms Subsystems EngineApplication Engine Main"

          FILES=$(find $TARGET_DIRS -type f \( -name "*.h" -o -name "*.cc" \))

          echo "$FILES" | xargs -r clang-tidy -p build --quiet

  build-test:
    name: Build And Test
    needs:
      - clang-tidy
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_tool: Visual Studio 17 2022
            build_type: Debug
            c_compiler: cl
            cpp_compiler: cl
          - os: windows-latest
            build_tool: Visual Studio 17 2022
            build_type: Release
            c_compiler: cl
            cpp_compiler: cl
          - os: windows-latest
            build_tool: Ninja
            build_type: Debug
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-latest
            build_tool: Ninja
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up MSVC
        if: startsWith(matrix.build_tool, 'Visual Studio')
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S "${{ github.workspace }}" \
          -B "${{ github.workspace }}/build" \
          -G "${{ matrix.build_tool }}" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test Core.Math
        working-directory: build
        run: |
          ctest -R Core.Math --output-on-failure

      - name: Test Core.Thread
        working-directory: build
        run: |
          ctest -R Core.Thread --output-on-failure

      - name: Test Core.Templates
        working-directory: build
        run: |
          ctest -R Core.Templates --output-on-failure

      - name: Test Core.Time
        working-directory: build
        run: |
          ctest -R Core.Time --output-on-failure

      - name: Test Core.IO
        working-directory: build
        run: |
          ctest -R Core.IO --output-on-failure

      - name: Test Core.Log
        working-directory: build
        run: |
          ctest -R Core.Log --output-on-failure